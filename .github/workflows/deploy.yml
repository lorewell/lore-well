name: Main Phaser Deploy

on:
  push:
    branches:
      - 'main'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Build Project
        run: |
          pnpm install
          pnpm build  # 此时产物会生成在 dist 文件夹中

      - name: Sync to Server
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.DEPLOY_HOST }}
          REMOTE_USER: ${{ secrets.DEPLOY_USER }}
          # 关键点 1：只上传 dist 文件夹下的内容（末尾加 / 表示上传内容而非文件夹本身）
          SOURCE: "dist/" 
          # 关键点 2：目标路径，确保这是 1Panel 静态站点存放文件的目录
          TARGET: "/opt/1panel/www/sites/games/index/lore-well/" 
          # 关键点 3：使用 -avz 增量传输，--delete 确保同步删除服务器上多余的旧文件
          ARGS: "-avz --delete"